{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ABHYAS</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <a href="/" class="nav-brand">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>ABHYAS</span>
            </a>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
            <div class="card glass-strong animate-up" style="max-width: 400px; width: 100%; padding: 2rem;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div class="logo-icon" style="margin: 0 auto 1rem; width: 60px; height: 60px; font-size: 1.5rem;">
                        <i class="fas fa-lock"></i>
                    </div>
                    <h2>Welcome Back</h2>
                    <p class="text-secondary">Please Login</p>
                </div>

                {% if messages %}
                {% for message in messages %}
                <div class="toast toast-{{ message.tags }}" style="position: static; margin-bottom: 1rem; width: 100%;">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Username or Email</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username or email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
                    Don't have an account? <a href="{% url 'register' %}" style="color: var(--secondary);">Register
                        here</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Remove this page from the browser history stack.
        // After login, pressing Back won't return here.
        history.replaceState(null, '', window.location.href);
    </script>

</body>

</html>
