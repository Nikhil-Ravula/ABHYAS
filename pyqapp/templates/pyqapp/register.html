{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ABHYAS</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <a href="/" class="nav-brand">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>ABHYAS</span>
            </a>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="container"
            style="display: flex; justify-content: center; align-items: center; min-height: 85vh; padding: 20px 0;">
            <div class="card glass-strong animate-up" style="max-width: 450px; width: 100%; padding: 2.5rem;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div class="logo-icon"
                        style="margin: 0 auto 1rem; width: 60px; height: 60px; font-size: 1.5rem; background: linear-gradient(135deg, var(--secondary), var(--primary));">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2>Create Account</h2>
                    <p class="text-secondary">Join the community</p>
                </div>

                {% if messages %}
                {% for message in messages %}
                <div class="toast toast-{{ message.tags }}" style="position: static; margin-bottom: 1rem; width: 100%;">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <!-- Honeypot: hidden from real users, auto-filled by bots -->
                    <input type="text" name="website" style="display:none" tabindex="-1" autocomplete="off">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-secondary" style="width: 100%; margin-top: 1rem;">
                        Register
                    </button>
                </form>
                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
                    Already have an account? <a href="{% url 'login' %}" style="color: var(--primary-light);">Login
                        here</a>
                </p>
                <div style="text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.08); font-size: 0.85rem; color: var(--text-secondary);">
                    Having issues? We're here to help on <a href="https://t.me/unknown_bot_5" target="_blank" rel="noopener noreferrer" style="color: #0088cc; text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 0.25rem;"><i class="fab fa-telegram"></i> Telegram</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Remove this page from the browser history stack.
        // After login, pressing Back won't return here.
        history.replaceState(null, '', window.location.href);
    </script>

</body>

</html>
